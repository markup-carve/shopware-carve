name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Optional Shopware Community Store publishing. Leave the secrets unset to
      # skip the upload step; the ZIP is still built and attached to the release.
      SHOPWARE_CLI_ACCOUNT_EMAIL: ${{ secrets.SHOPWARE_CLI_ACCOUNT_EMAIL }}
      SHOPWARE_CLI_ACCOUNT_PASSWORD: ${{ secrets.SHOPWARE_CLI_ACCOUNT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Shopware CLI
        uses: shopware/shopware-cli-action@v3

      - name: Validate extension
        run: shopware-cli extension validate .

      - name: Build extension ZIP
        run: shopware-cli extension zip .

      # Release notes live in the repo (.github/release-notes/<version>.md) so
      # they survive even if the GitHub release is deleted, and the tag alone
      # produces a fully-populated release. Fail loudly if the file is missing.
      - name: Resolve release notes
        run: |
          NOTES=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::Missing release notes file $NOTES - create it before tagging ${GITHUB_REF_NAME}."
            exit 1
          fi
          echo "NOTES_FILE=$NOTES" >> "$GITHUB_ENV"

      - name: Publish GitHub release with ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          body_path: ${{ env.NOTES_FILE }}
          fail_on_unmatched_files: true

      - name: Upload to Shopware Community Store
        if: ${{ env.SHOPWARE_CLI_ACCOUNT_EMAIL != '' }}
        run: shopware-cli account producer extension upload *.zip
