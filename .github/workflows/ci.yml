name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']
    steps:
      # composer.json resolves markup-carve/carve-php via a local path
      # repository at ../carve-php, so both repos are checked out as siblings.
      - name: Checkout shopware-carve
        uses: actions/checkout@v4
        with:
          path: shopware-carve

      - name: Checkout carve-php (sibling path dependency)
        uses: actions/checkout@v4
        with:
          repository: markup-carve/carve-php
          path: carve-php

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Install dependencies
        working-directory: shopware-carve
        run: composer install --no-interaction --no-progress

      - name: Test
        working-directory: shopware-carve
        run: vendor/bin/phpunit
